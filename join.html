<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Trip — SplitMate</title>
  <meta name="description" content="You've been invited to join a trip on SplitMate. Download the app to split expenses with your group.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root { --teal: #186962; --dark: #2C2C2A; --gray: #5F5E5A; --bg: #FAF9F6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 14px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 100%; height: 100%; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .code { font-size: 28px; font-weight: 800; letter-spacing: 4px; color: var(--teal); margin: 16px 0; }
    p { color: var(--gray); font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: var(--teal);
      color: white;
      font-weight: 600;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .alt { font-size: 13px; color: var(--gray); margin-top: 16px; }
    .alt a { color: var(--teal); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"><rect width="72" height="72" fill="#0D2B2E"/><path d="M0,0 L36,0 L26,24 L36,48 L26,72 L0,72Z" fill="#1ABC9C"/><polyline points="36,0 26,24 36,48 26,72" fill="none" stroke="#E8FFFA" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/></svg>
    </div>
    <h1>You're Invited!</h1>
    <p>Someone invited you to join a trip on SplitMate.</p>
    <div class="code" id="inviteCode"></div>
    <p>Open SplitMate on your phone to join, or download it free.</p>
    <a class="btn" id="deepLink" href="#">Open SplitMate</a>
    <p class="alt">Don't have the app? <a href="/">Download free</a></p>
  </div>
  <script>
    const path = window.location.pathname;
    const parts = path.split('/').filter(Boolean);
    const code = parts.length >= 2 ? parts[1] : '';

    if (code) {
      document.getElementById('inviteCode').textContent = code.toUpperCase();
      document.getElementById('deepLink').href = 'splitmate://join/' + code;
    }
  </script>
</body>
</html>
